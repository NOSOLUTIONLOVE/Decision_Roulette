<!--
  命运之轮 Decision Roulette — Open Graph 默认图
  尺寸：1200×630
  生产环境应将此 SVG 转换为 1200×630 PNG（/og-default.png）以获得更广泛的社交平台兼容性。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="命运之轮 Decision Roulette">
  <!-- 暖纸背景 -->
  <rect width="1200" height="630" fill="#faf9f5" />

  <!-- 细微装饰边框 -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c96442" stroke-width="1.5" opacity="0.35" />

  <!-- 顶部 fleuron 装饰 -->
  <text x="600" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#c96442" opacity="0.8">❧</text>

  <!-- 主标题：命运之轮（Newsreader italic 风格，赭红色） -->
  <text x="600" y="270" text-anchor="middle" font-family="'Newsreader', 'Lora', Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400" font-size="128" fill="#c96442" letter-spacing="4">命运之轮</text>

  <!-- 副标题：Decision Roulette -->
  <text x="600" y="348" text-anchor="middle" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="36" fill="#2a2622" letter-spacing="6">DECISION ROULETTE</text>

  <!-- 分隔细线 -->
  <line x1="500" y1="402" x2="700" y2="402" stroke="#c96442" stroke-width="1" opacity="0.5" />

  <!-- 底部 tagline -->
  <text x="600" y="468" text-anchor="middle" font-family="'Newsreader', 'Lora', Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400" font-size="26" fill="#4a4239" opacity="0.85">输入选项，把选择困难变成一场仪式感体验</text>

  <!-- 底部 fleuron 装饰 -->
  <text x="600" y="544" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#c96442" opacity="0.7">❧</text>
</svg>
